<div class="company-page">

  <div class="company-card">

    <h2>Companies</h2>

    <button routerLink="/company/create">Create Company</button>

    <div class="alert alert-info mt-3" *ngIf="loading">
      Loading companies...
    </div>

    <div class="alert alert-danger mt-3" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert alert-warning mt-3" *ngIf="!loading && !errorMessage && companies.length === 0">
      No companies found yet.
    </div>

    <table *ngIf="!loading && companies.length > 0">

    <thead>

      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Email</th>
        <th>Phone</th>
        <th>City</th>
        <th>Country</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let company of companies">

        <td>{{ company.companyName }}</td>
        <td>{{ company.companyCode }}</td>
        <td>{{ company.email }}</td>
        <td>{{ company.phone }}</td>
        <td>{{ company.city }}</td>
        <td>{{ company.country }}</td>

        <td>

          <button (click)="viewCompany(company.id!)">View</button>

          <button (click)="editCompany(company.id!)">Edit</button>

          <button
            (click)="deleteCompany(company.id!)">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

    </table>

  </div>

</div>
