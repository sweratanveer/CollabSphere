<div class="company-edit-page">
  <div class="company-edit-card">
    <h1 class="page-title">Edit Company</h1>

    <p class="page-subtitle">Update your company information.</p>

    <form [formGroup]="companyForm" (ngSubmit)="updateCompany()" class="company-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label"> Company Name </label>

          <input
            type="text"
            class="form-control"
            placeholder="Enter company name"
            formControlName="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label"> Email </label>

          <input
            type="email"
            class="form-control"
            placeholder="Enter company email"
            formControlName="email"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label"> Phone </label>

          <input
            type="text"
            class="form-control"
            placeholder="Phone number"
            formControlName="phone"
          />
        </div>

        <div class="form-group">
          <label class="form-label"> Website </label>

          <input type="text" class="form-control" placeholder="Website" formControlName="website" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label"> Industry </label>

          <input
            type="text"
            class="form-control"
            placeholder="Industry"
            formControlName="industry"
          />
        </div>

        <div class="form-group">
          <label class="form-label"> City </label>

          <input type="text" class="form-control" placeholder="City" formControlName="city" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label"> Country </label>

          <input type="text" class="form-control" placeholder="Country" formControlName="country" />
        </div>

        <div class="form-group">
          <label class="form-label"> Address </label>

          <input type="text" class="form-control" placeholder="Address" formControlName="address" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"> Description </label>

        <textarea
          rows="5"
          class="form-control"
          placeholder="Company description"
          formControlName="description"
        >
        </textarea>
      </div>

      <div class="button-group">
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>

        <button type="submit" class="save-btn" [disabled]="submitting()">
          {{ submitting() ? 'Updating...' : 'Update Company' }}
        </button>
      </div>
    </form>
  </div>
</div>
