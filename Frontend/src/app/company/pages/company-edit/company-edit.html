<div class="company-edit-page">

  <div class="company-edit-card">

    <h1 class="page-title">
      Edit Company
    </h1>

    <p class="page-subtitle">
      Update your company information.
    </p>

    <form
      [formGroup]="companyForm"
      (ngSubmit)="updateCompany()"
      class="company-form">

      <div class="form-row">

        <div class="form-group">

          <label
            class="form-label"
            for="companyName">
            Company Name
          </label>

          <input
            id="companyName"
            type="text"
            class="form-control"
            placeholder="Enter company name"
            formControlName="companyName">

        </div>

        <div class="form-group">

          <label
            class="form-label"
            for="companyCode">
            Company Code
          </label>

          <input
            id="companyCode"
            type="text"
            class="form-control"
            placeholder="Enter company code"
            formControlName="companyCode">

        </div>

      </div>

      <div class="form-row">

        <div class="form-group">

          <label
            class="form-label"
            for="email">
            Email
          </label>

          <input
            id="email"
            type="email"
            class="form-control"
            placeholder="Enter company email"
            formControlName="email">

        </div>

        <div class="form-group">

          <label
            class="form-label"
            for="phone">
            Phone
          </label>

          <input
            id="phone"
            type="text"
            class="form-control"
            placeholder="Phone number"
            formControlName="phone">

        </div>

      </div>

      <div class="form-row">

        <div class="form-group">

          <label
            class="form-label"
            for="website">
            Website
          </label>

          <input
            id="website"
            type="text"
            class="form-control"
            placeholder="Website"
            formControlName="website">

        </div>

        <div class="form-group">

          <label
            class="form-label"
            for="industry">
            Industry
          </label>

          <input
            id="industry"
            type="text"
            class="form-control"
            placeholder="Industry"
            formControlName="industry">

        </div>

      </div>

      <div class="form-row">

        <div class="form-group">

          <label
            class="form-label"
            for="address">
            Address
          </label>

          <input
            id="address"
            type="text"
            class="form-control"
            placeholder="Address"
            formControlName="address">

        </div>

        <div class="form-group">

          <label
            class="form-label"
            for="city">
            City
          </label>

          <input
            id="city"
            type="text"
            class="form-control"
            placeholder="City"
            formControlName="city">

        </div>

      </div>

      <div class="form-row">

        <div class="form-group">

          <label
            class="form-label"
            for="country">
            Country
          </label>

          <input
            id="country"
            type="text"
            class="form-control"
            placeholder="Country"
            formControlName="country">

        </div>

        <div class="form-group">

          <label
            class="form-label"
            for="logo">
            Logo URL
          </label>

          <input
            id="logo"
            type="text"
            class="form-control"
            placeholder="Paste logo URL"
            formControlName="logo">

        </div>

      </div>

      <div class="form-group">

        <label
          class="form-label"
          for="description">
          Description
        </label>

        <textarea
          id="description"
          rows="5"
          class="form-control"
          placeholder="Company description"
          formControlName="description">
        </textarea>

      </div>

      <div class="form-group">

        <label
          class="form-label"
          for="companyStatus">
          Status
        </label>

        <select
          id="companyStatus"
          class="form-select"
          formControlName="isActive"
          title="Company Status"
          aria-label="Company Status">

          <option [ngValue]="true">
            Active
          </option>

          <option [ngValue]="false">
            Inactive
          </option>

        </select>

      </div>

      <div class="button-group">

        <button
          type="button"
          class="cancel-btn"
          (click)="cancel()"
          [disabled]="submitting()">

          Cancel

        </button>

        <button
          type="submit"
          class="save-btn"
          [disabled]="submitting()">

          {{ submitting() ? 'Updating...' : 'Update Company' }}

        </button>

      </div>

    </form>

  </div>

</div>
