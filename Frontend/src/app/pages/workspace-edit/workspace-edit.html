<div class="workspace-form-page">
  <h2>Edit Workspace</h2>

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  @if (loading()) {
    <div class="loading">Loading workspace...</div>
  }

  @if (!loading()) {
    <div class="workspace-form">
      <label class="field-label" for="editWorkspaceName">Workspace Name</label>
      <input
        id="editWorkspaceName"
        type="text"
        [ngModel]="workspaceName()"
        (ngModelChange)="workspaceName.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editSlug">Slug</label>
      <input
        id="editSlug"
        type="text"
        [ngModel]="slug()"
        (ngModelChange)="slug.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editTimezone">Timezone</label>
      <input
        id="editTimezone"
        type="text"
        [ngModel]="timezone()"
        (ngModelChange)="timezone.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editSubscriptionPlan">Subscription Plan</label>
      <select
        id="editSubscriptionPlan"
        [ngModel]="subscriptionPlan()"
        (ngModelChange)="subscriptionPlan.set($event)"
        class="form-control"
        aria-label="Subscription Plan"
      >
        <option value="FREE">Free</option>
        <option value="PROFESSIONAL">Professional</option>
        <option value="ENTERPRISE">Enterprise</option>
      </select>

      <label class="field-label" for="editMaxUsers">Max Users</label>
      <input
        id="editMaxUsers"
        type="number"
        [ngModel]="maxUsers()"
        (ngModelChange)="maxUsers.set($event)"
        class="form-control"
        min="1"
      />

      <div class="form-actions">
        <button type="button" class="action-button" (click)="save()" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Save Changes' }}
        </button>
        <a routerLink="/workspace" class="cancel-link">Cancel</a>
      </div>
    </div>
  }
</div>
