<div class="event-form-page">
  <div class="event-form">
    <div class="form-tabs">
      <a class="active">Edit Event</a>
      <a routerLink="/calendar">Calendar</a>
    </div>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    @if (loading()) {
      <div class="loading">Loading event...</div>
    }

    @if (!loading()) {
      <label class="field-label" for="editTitle">Title</label>
      <input
        id="editTitle"
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editDescription">Description</label>
      <textarea
        id="editDescription"
        rows="3"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        class="form-control"
      ></textarea>

      <label class="field-label" for="editType">Type</label>
      <select
        id="editType"
        [ngModel]="type()"
        (ngModelChange)="type.set($event)"
        class="form-control"
        aria-label="Type"
      >
        <option value="MEETING">Meeting</option>
        <option value="TASK_DEADLINE">Task Deadline</option>
        <option value="REMINDER">Reminder</option>
        <option value="OTHER">Other</option>
      </select>

      <label class="field-label" for="editStartTime">Start</label>
      <input
        id="editStartTime"
        type="datetime-local"
        [ngModel]="startTime()"
        (ngModelChange)="startTime.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editEndTime">End</label>
      <input
        id="editEndTime"
        type="datetime-local"
        [ngModel]="endTime()"
        (ngModelChange)="endTime.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editAllDay">All Day</label>
      <select
        id="editAllDay"
        [ngModel]="allDay()"
        (ngModelChange)="allDay.set($event)"
        class="form-control"
        aria-label="All Day"
      >
        <option [ngValue]="false">No</option>
        <option [ngValue]="true">Yes</option>
      </select>

      <div class="form-actions">
        <button type="button" class="action-button" (click)="save()" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Save Changes' }}
        </button>
        <a routerLink="/calendar" class="cancel-link">Cancel</a>
      </div>
    }
  </div>
</div>
