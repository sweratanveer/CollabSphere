<div class="register-page">
  <div class="register-card">
    <div class="register-tabs">
      <a routerLink="/login">Login</a>
      <a class="active">Sign Up</a>
    </div>

    <div class="register-header">
      <h2>Create your account</h2>
      <p>Join CollabSphere and manage your projects, teams, and collaboration from one secure platform.</p>
    </div>

    <div class="login-form">
      <label class="field-label">Full Name</label>
      <input
        type="text"
        class="form-control"
        placeholder="Full Name"
        [(ngModel)]="fullName"
      />

      <label class="field-label">Email</label>
      <input
        type="email"
        class="form-control"
        placeholder="Email"
        [(ngModel)]="email"
      />

      <label class="field-label">Password</label>
      <input
        type="password"
        class="form-control"
        placeholder="Password"
        [(ngModel)]="password"
      />

      <label class="field-label">Role</label>
      <select class="form-select" [(ngModel)]="role">
        <option value="SUPER_ADMIN">SUPER_ADMIN</option>
        <option value="COMPANY_ADMIN">COMPANY_ADMIN</option>
        <option value="PROJECT_MANAGER">PROJECT_MANAGER</option>
        <option value="TEAM_LEADER">TEAM_LEADER</option>
        <option value="EMPLOYEE">EMPLOYEE</option>
        <option value="CLIENT">CLIENT</option>
      </select>

      <button
        class="action-button"
        (click)="register()"
        [disabled]="loading"
      >
        {{ loading ? 'Please Wait...' : 'Register' }}
      </button>

      <a class="forgot-link" routerLink="/login">Already have an account?</a>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>
    </div>
  </div>
</div>
