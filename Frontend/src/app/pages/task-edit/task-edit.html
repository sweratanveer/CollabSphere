<div class="task-form-page">
  <div class="task-form">
    <div class="form-tabs">
      <a class="active">Edit Task</a>
      <a routerLink="/tasks">Task List</a>
    </div>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    @if (loading()) {
      <div class="loading">Loading task...</div>
    }

    @if (!loading()) {
      <label class="field-label" for="editTitle">Title</label>
      <input
        id="editTitle"
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        class="form-control"
      />

      <label class="field-label" for="editDescription">Description</label>
      <textarea
        id="editDescription"
        rows="3"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        class="form-control"
      ></textarea>

      <label class="field-label" for="editAssignedToId">Assign To</label>
      <select
        id="editAssignedToId"
        [ngModel]="assignedToId()"
        (ngModelChange)="assignedToId.set($event)"
        class="form-control"
        aria-label="Assign To"
      >
        <option value="">Unassigned</option>
        @for (user of users(); track user.id) {
          <option [value]="user.id">{{ user.fullName }}</option>
        }
      </select>

      <label class="field-label" for="editStatus">Status</label>
      <select
        id="editStatus"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)"
        class="form-control"
        aria-label="Status"
      >
        <option value="TODO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="IN_REVIEW">In Review</option>
        <option value="DONE">Done</option>
      </select>

      <label class="field-label" for="editPriority">Priority</label>
      <select
        id="editPriority"
        [ngModel]="priority()"
        (ngModelChange)="priority.set($event)"
        class="form-control"
        aria-label="Priority"
      >
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="URGENT">Urgent</option>
      </select>

      <label class="field-label" for="editDueDate">Due Date</label>
      <input
        id="editDueDate"
        type="date"
        [ngModel]="dueDate()"
        (ngModelChange)="dueDate.set($event)"
        class="form-control"
      />

      <div class="form-actions">
        <button type="button" class="action-button" (click)="save()" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Save Changes' }}
        </button>
        <a routerLink="/tasks" class="cancel-link">Cancel</a>
      </div>
    }
  </div>
</div>
